<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>roMANce — 沉浸式 AI 戀愛角色扮演</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌹</text></svg>" />
</head>
<body>
  <header class="topbar">
    <h1 class="logo" id="logo">🌹 roMANce <span>唯戀</span></h1>
    <button class="btn ghost" id="btn-home" hidden>← 返回角色列表</button>
  </header>

  <!-- ============ 角色列表 ============ -->
  <main id="view-home" class="view">
    <section class="section-head">
      <h2>我的角色</h2>
      <div>
        <button class="btn primary" id="btn-new-character">＋ 創建角色</button>
      </div>
    </section>
    <div class="card-grid" id="character-grid"></div>

    <section class="section-head">
      <h2>進行中的故事</h2>
    </section>
    <div class="chat-list" id="chat-list"></div>
  </main>

  <!-- ============ 聊天 ============ -->
  <main id="view-chat" class="view" hidden>
    <div class="chat-layout">
      <section class="chat-main">
        <div class="chat-header">
          <div class="chat-avatar" id="chat-avatar"></div>
          <div>
            <div class="chat-name" id="chat-name"></div>
            <div class="chat-sub" id="chat-sub"></div>
          </div>
          <div class="chat-actions">
            <button class="btn ghost small" id="btn-regenerate" title="重新生成上一則回覆">↻ 重寫</button>
          </div>
        </div>
        <div class="messages" id="messages"></div>
        <form class="composer" id="composer">
          <textarea id="input" rows="2"
            placeholder="輸入你的行動與對白……（用（括號）可以下 OOC 指令，例如：（時間跳到隔天早上））"></textarea>
          <button class="btn primary" id="btn-send" type="submit">傳送</button>
        </form>
      </section>
      <aside class="emotion-panel">
        <h3>六維情感</h3>
        <svg id="radar" viewBox="0 0 220 220"></svg>
        <div id="emotion-bars"></div>
        <p class="hint">數值會隨每輪互動真實波動，<br/>劇情走向由你掌握。</p>
      </aside>
    </div>
  </main>

  <!-- ============ 角色編輯 ============ -->
  <div class="modal-backdrop" id="editor" hidden>
    <div class="modal">
      <h2 id="editor-title">創建角色</h2>

      <div class="gen-box">
        <input id="gen-idea" placeholder="一句話構想，例如：ABO 世界觀、表面溫柔實則佔有慾極強的財閥 Alpha" />
        <button class="btn accent" id="btn-generate">✨ AI 生成人設</button>
      </div>
      <div class="gen-status" id="gen-status" hidden>正在孕育角色，請稍候……</div>

      <form id="character-form" class="char-form">
        <div class="row2">
          <label>姓名 *<input name="name" required /></label>
          <label>性別<input name="gender" /></label>
        </div>
        <div class="row2">
          <label>年齡<input name="age" /></label>
          <label>身分／職業<input name="identity" /></label>
        </div>
        <label>外貌<textarea name="appearance" rows="2"></textarea></label>
        <label>氣味／信息素<input name="scent" /></label>
        <label>性格<textarea name="personality" rows="2"></textarea></label>
        <div class="row2">
          <label>喜好<input name="likes" /></label>
          <label>厭惡<input name="dislikes" /></label>
        </div>
        <label>說話風格<input name="speechStyle" /></label>
        <label>背景故事<textarea name="background" rows="3"></textarea></label>
        <label>隱藏設定（秘密／執念）<textarea name="secret" rows="2"></textarea></label>
        <div class="row2">
          <label>世界觀<input name="worldview" /></label>
          <label>初始關係<input name="relationship" /></label>
        </div>
        <label>開場白（第一段劇情）<textarea name="greeting" rows="4"></textarea></label>
        <div class="modal-actions">
          <button type="button" class="btn ghost" id="btn-cancel">取消</button>
          <button type="submit" class="btn primary">儲存角色</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ============ 開始聊天（設定我的角色） ============ -->
  <div class="modal-backdrop" id="persona-modal" hidden>
    <div class="modal small-modal">
      <h2>開始新的故事</h2>
      <p class="hint" id="persona-with"></p>
      <label>你扮演的角色（選填）
        <textarea id="persona-input" rows="3"
          placeholder="描述你自己的人設，例如：剛入職的新人設計師，嘴硬心軟……留空則由劇情自然帶出"></textarea>
      </label>
      <div class="modal-actions">
        <button type="button" class="btn ghost" id="persona-cancel">取消</button>
        <button type="button" class="btn primary" id="persona-start">開始 ♥</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
